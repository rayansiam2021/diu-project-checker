<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — DIU Project Checker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-soft">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">DIU Project Checker</a>
      <a href="dashboard.html" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="glass card p-4" style="max-width: 700px; margin: auto;">
      <h4 class="mb-3 fw-bold">Student Profile</h4>

      <div class="d-flex align-items-center gap-3 mb-3">
        <img id="profilePhoto" src="" alt="Profile photo" class="profile-photo" style="display: none;">
        <div>
          <div id="profileName" class="h5 mb-0"></div>
          <div id="profileMeta" class="text-muted small"></div>
        </div>
      </div>

      <div id="profileInfo" class="mb-3"></div>

      <hr>
      <h5 class="fw-semibold">Change Password</h5>
      <div id="pwdMsg"></div>
      <form id="pwdForm">
        <div class="mb-2">
          <label class="form-label">Old Password</label>
          <input id="old_pwd" class="form-control" type="password" required>
        </div>
        <div class="mb-2">
          <label class="form-label">New Password</label>
          <input id="new_pwd" class="form-control" type="password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input id="confirm_new" class="form-control" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit">Update Password</button>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
