<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up — DIU Project Checker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-soft page-animate">
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">DIU Project Checker</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm">
          <h3 class="mb-3 text-center fw-bold">Student Sign Up</h3>
          <div id="msg"></div>
          <form id="signupForm">
            <div class="mb-2">
              <label class="form-label">Student ID</label>
              <input class="form-control" id="student_id" required autocomplete="username">
            </div>
            <div class="mb-2">
              <label class="form-label">Full Name</label>
              <input class="form-control" id="name" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Department</label>
              <input class="form-control" id="department" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Level</label>
              <select class="form-select" id="level" required>
                <option value="Undergraduate">Undergraduate</option>
                <option value="Graduate">Graduate</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Profile Picture <span class="text-muted">(optional)</span></label>
              <input class="form-control" id="photo" type="file" accept="image/*">
              <div class="form-text">JPG or PNG recommended.</div>
            </div>
            <div class="mb-2">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required autocomplete="new-password">
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirm_password" required autocomplete="new-password">
            </div>
            <button class="btn btn-success w-100" type="submit">Create Account</button>
          </form>
          <p class="mt-3 text-center text-muted small">
            Already have an account? <a href="login.html">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
