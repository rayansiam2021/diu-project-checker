<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — DIU Project Checker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-soft page-animate">
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">DIU Project Checker</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4 shadow-sm">
          <h3 class="mb-3 text-center fw-bold">Student Login</h3>
          <div id="msg"></div>
          <form id="loginForm">
            <div class="mb-2">
              <label class="form-label">Student ID</label>
              <input class="form-control" id="student_id" required autocomplete="username">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required autocomplete="current-password">
            </div>
            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>
          <p class="mt-3 text-center text-muted small">
            New student? <a href="signup.html">Create an account</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
